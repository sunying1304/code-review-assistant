<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>代码 Review 助手</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 20px; font-weight: 600; }
    header span { font-size: 13px; opacity: 0.6; margin-left: 4px; }
    .container { max-width: 1100px; margin: 32px auto; padding: 0 24px; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px 32px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .lang-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .lang-tab {
      padding: 6px 20px; border-radius: 6px; border: 1.5px solid #d9d9d9;
      cursor: pointer; font-size: 13px; background: #fff; color: #666;
      transition: all 0.15s;
    }
    .lang-tab.active { border-color: #1677ff; color: #1677ff; background: #e8f4fd; font-weight: 600; }
    textarea {
      width: 100%; height: 320px;
      padding: 14px; border: 1.5px solid #d9d9d9; border-radius: 8px;
      font-size: 13px; line-height: 1.7; resize: vertical;
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      outline: none; background: #fafafa; color: #1a1a2e;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #1677ff; background: #fff; }
    .btn-review {
      display: block; width: 100%; padding: 14px;
      background: linear-gradient(135deg, #1677ff, #0958d9);
      color: #fff; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      margin-top: 16px; transition: opacity 0.2s;
    }
    .btn-review:hover { opacity: 0.9; }
    .btn-review:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 分数卡片 */
    .score-bar { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
    .score-circle {
      width: 80px; height: 80px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 700; flex-shrink: 0;
      border: 4px solid;
    }
    .score-high { border-color: #52c41a; color: #52c41a; }
    .score-mid  { border-color: #faad14; color: #faad14; }
    .score-low  { border-color: #ff4d4f; color: #ff4d4f; }
    .score-summary { font-size: 14px; color: #555; line-height: 1.7; }
    .stat-badges { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .badge {
      padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .badge-critical { background: #fff1f0; color: #cf1322; border: 1px solid #ffccc7; }
    .badge-warning  { background: #fffbe6; color: #d46b08; border: 1px solid #ffe58f; }
    .badge-info     { background: #e6f7ff; color: #0958d9; border: 1px solid #91caff; }

    /* 问题列表 */
    .issue-list { display: flex; flex-direction: column; gap: 14px; }
    .issue-item {
      border-radius: 8px; padding: 16px 18px;
      border-left: 4px solid;
    }
    .issue-critical { border-color: #ff4d4f; background: #fff9f9; }
    .issue-warning  { border-color: #faad14; background: #fffdf0; }
    .issue-info     { border-color: #1677ff; background: #f0f7ff; }
    .issue-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .issue-line { font-size: 12px; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; font-family: monospace; }
    .issue-dim {
      font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600;
    }
    .dim-readability  { background: #f9f0ff; color: #531dab; }
    .dim-performance  { background: #fff7e6; color: #ad6800; }
    .dim-security     { background: #fff1f0; color: #a8071a; }
    .dim-best_practice{ background: #e6fffb; color: #006d75; }
    .sev-tag {
      font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
    }
    .sev-critical { background: #ff4d4f; color: #fff; }
    .sev-warning  { background: #faad14; color: #fff; }
    .sev-info     { background: #1677ff; color: #fff; }
    .issue-desc { font-size: 13px; color: #333; margin-bottom: 6px; }
    .issue-suggestion { font-size: 13px; color: #555; margin-bottom: 8px; }
    .issue-suggestion strong { color: #1677ff; }
    .issue-code {
      background: #1e1e2e; color: #cdd6f4; padding: 10px 14px;
      border-radius: 6px; font-size: 12px; font-family: monospace;
      white-space: pre-wrap; word-break: break-all; margin-top: 6px;
    }

    /* 加载动画 */
    .loading { display: none; text-align: center; padding: 40px; }
    .loading.show { display: block; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #e8e8e8;
      border-top-color: #1677ff; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 结果区 */
    .result-section { display: none; }
    .result-section.show { display: block; }

    /* 示例按钮 */
    .examples { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .example-btn {
      padding: 4px 12px; border-radius: 6px; border: 1px solid #d9d9d9;
      font-size: 12px; cursor: pointer; background: #fafafa; color: #555;
      transition: all 0.15s;
    }
    .example-btn:hover { border-color: #1677ff; color: #1677ff; background: #e8f4fd; }

    .dim-legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; margin-top: 8px; }
    .dim-legend span { padding: 2px 10px; border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <div style="font-size:24px">🔍</div>
  <div>
    <h1>代码 Review 助手</h1>
    <span>粘贴代码，AI 自动分析可读性 · 性能 · 安全性 · 最佳实践</span>
  </div>
</header>

<div class="container">

  <!-- 输入区 -->
  <div class="card">
    <h2>📝 粘贴代码</h2>

    <!-- 语言选择 -->
    <div class="lang-tabs">
      <button class="lang-tab active" onclick="setLang('python', this)">Python</button>
      <button class="lang-tab" onclick="setLang('javascript', this)">JavaScript</button>
    </div>

    <textarea id="code-input" placeholder="在此粘贴你的 Python 或 JavaScript 代码..."></textarea>

    <!-- 快速示例 -->
    <div class="examples">
      <span style="font-size:12px;color:#888;align-self:center;">快速示例：</span>
      <button class="example-btn" onclick="loadExample('py_bad')">Python 低质量</button>
      <button class="example-btn" onclick="loadExample('py_medium')">Python 中等质量</button>
      <button class="example-btn" onclick="loadExample('py_good')">Python 高质量</button>
      <button class="example-btn" onclick="loadExample('js_bad')">JS 低质量</button>
      <button class="example-btn" onclick="loadExample('js_good')">JS 高质量</button>
    </div>

    <button class="btn-review" id="review-btn" onclick="startReview()">开始 Review</button>
  </div>

  <!-- 加载中 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="color:#888;font-size:14px;">AI 正在分析代码，请稍候...</div>
  </div>

  <!-- 结果区 -->
  <div class="result-section" id="result-section">

    <!-- 总分 -->
    <div class="card">
      <h2>📊 Review 结果</h2>
      <div class="score-bar">
        <div class="score-circle" id="score-circle">--</div>
        <div>
          <div class="score-summary" id="score-summary"></div>
          <div class="stat-badges" id="stat-badges"></div>
        </div>
      </div>
      <div class="dim-legend">
        <span class="dim-readability">可读性</span>
        <span class="dim-performance">性能</span>
        <span class="dim-security">安全性</span>
        <span class="dim-best_practice">最佳实践</span>
      </div>
    </div>

    <!-- 问题列表 -->
    <div class="card" id="issues-card" style="display:none;">
      <h2>⚠️ 发现的问题</h2>
      <div class="issue-list" id="issue-list"></div>
    </div>

  </div>

</div>

<script>
  let currentLang = 'python';

  function setLang(lang, el) {
    currentLang = lang;
    document.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  // 示例代码
  const examples = {
    py_bad: `import os, sys
password = "admin123"
db_host = "192.168.1.1"

def get_user(id):
    import sqlite3
    conn = sqlite3.connect("users.db")
    c = conn.cursor()
    c.execute("SELECT * FROM users WHERE id = " + str(id))
    result = c.fetchall()
    return result

def calculate(data):
    result = []
    for i in range(len(data)):
        for j in range(len(data)):
            if data[i] == data[j] and i != j:
                result.append(data[i])
    return result

def process(x):
    try:
        return int(x) / 0
    except:
        pass`,

    py_medium: `from typing import List
import hashlib

SECRET_KEY = "my_secret_key_123"

def find_duplicates(data: List) -> List:
    seen = set()
    duplicates = []
    for item in data:
        if item in seen:
            duplicates.append(item)
        seen.add(item)
    return duplicates

def hash_password(password: str) -> str:
    return hashlib.md5(password.encode()).hexdigest()

class UserManager:
    def __init__(self):
        self.users = {}

    def add_user(self, name, password):
        if name in self.users:
            return False
        self.users[name] = hash_password(password)
        return True

    def get_all(self):
        return self.users`,

    py_good: `from typing import List, Optional
import hashlib
import secrets
import logging

logger = logging.getLogger(__name__)


def find_duplicates(data: List) -> List:
    """返回列表中的重复元素（去重后）。"""
    seen = set()
    duplicates = set()
    for item in data:
        if item in seen:
            duplicates.add(item)
        seen.add(item)
    return list(duplicates)


def hash_password(password: str) -> str:
    """使用 SHA-256 + salt 对密码进行哈希处理。"""
    salt = secrets.token_hex(16)
    hashed = hashlib.sha256((salt + password).encode()).hexdigest()
    return f"{salt}:{hashed}"


class UserManager:
    """管理用户账号的创建和查询。"""

    def __init__(self):
        self._users: dict[str, str] = {}

    def add_user(self, name: str, password: str) -> bool:
        """新增用户，若用户名已存在则返回 False。"""
        if not name or not password:
            raise ValueError("用户名和密码不能为空")
        if name in self._users:
            logger.warning("尝试添加已存在的用户: %s", name)
            return False
        self._users[name] = hash_password(password)
        logger.info("用户 %s 创建成功", name)
        return True

    def get_user_count(self) -> int:
        """返回当前用户总数。"""
        return len(self._users)`,

    js_bad: `var password = "admin123"
var apiKey = "sk-abc123456789"

function getUser(id) {
  var xhr = new XMLHttpRequest()
  xhr.open("GET", "http://api.example.com/users/" + id, false)

    js_good: `const API_BASE = process.env.REACT_APP_API_URL;

/**
 * 获取用户信息
 * @param {string} userId - 用户 ID
 * @returns {Promise<Object>} 用户数据
 */
async function getUser(userId) {
  if (!userId || typeof userId !== 'string') {
    throw new TypeError('userId 必须是非空字符串');
  }
  const response = await fetch(\`\${API_BASE}/users/\${encodeURIComponent(userId)}\`);
  if (!response.ok) {
    throw new Error(\`请求失败: \${response.status}\`);
  }
  return response.json();
}

/**
 * 安全渲染文本消息（防止 XSS）
 * @param {string} msg - 要渲染的文本
 */
function renderMessage(msg) {
  const el = document.getElementById('output');
  el.textContent = msg;
}

/**
 * 查找数组中第一个匹配项的索引
 * @param {Array} arr
 * @param {*} val
 * @returns {number}
 */
function findItem(arr, val) {
  return arr.findIndex(item => item === val);
}`
  };

  function loadExample(key) {
    const code = examples[key];
    document.getElementById('code-input').value = code;
    // 自动切换语言
    const lang = key.startsWith('py') ? 'python' : 'javascript';
    document.querySelectorAll('.lang-tab').forEach(t => {
      t.classList.toggle('active', t.textContent.toLowerCase().includes(lang === 'python' ? 'python' : 'java'));
    });
    currentLang = lang;
  }

  async function startReview() {
    const code = document.getElementById('code-input').value.trim();
    if (!code) { alert('请先粘贴代码'); return; }

    const btn = document.getElementById('review-btn');
    btn.disabled = true;
    btn.textContent = '分析中...';
    document.getElementById('loading').classList.add('show');
    document.getElementById('result-section').classList.remove('show');

    try {
      const res = await fetch('/review', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, language: currentLang }),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || '请求失败');
      }
      const data = await res.json();
      renderResult(data);
    } catch (e) {
      alert('Review 失败：' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '开始 Review';
      document.getElementById('loading').classList.remove('show');
    }
  }

  function renderResult(data) {
    // 分数
    const score = data.score || 0;
    const circle = document.getElementById('score-circle');
    circle.textContent = score;
    circle.className = 'score-circle ' + (score >= 80 ? 'score-high' : score >= 60 ? 'score-mid' : 'score-low');

    // 摘要
    document.getElementById('score-summary').textContent = data.summary || '';

    // 统计徽章
    const stats = data.stats || {};
    document.getElementById('stat-badges').innerHTML = `
      <span class="badge badge-critical">🔴 Critical: ${stats.critical || 0}</span>
      <span class="badge badge-warning">🟡 Warning: ${stats.warning || 0}</span>
      <span class="badge badge-info">🔵 Info: ${stats.info || 0}</span>
    `;

    // 问题列表
    const issues = data.issues || [];
    const issuesCard = document.getElementById('issues-card');
    const issueList = document.getElementById('issue-list');

    if (issues.length === 0) {
      issuesCard.style.display = 'none';
    } else {
      issuesCard.style.display = 'block';
      // 按严重程度排序：critical > warning > info
      const order = { critical: 0, warning: 1, info: 2 };
      issues.sort((a, b) => (order[a.severity] || 0) - (order[b.severity] || 0));

      const dimLabel = {
        readability: '可读性',
        performance: '性能',
        security: '安全性',
        best_practice: '最佳实践',
      };

      issueList.innerHTML = issues.map(issue => `
        <div class="issue-item issue-${issue.severity}">
          <div class="issue-header">
            <span class="sev-tag sev-${issue.severity}">${issue.severity.toUpperCase()}</span>
            <span class="issue-line">第 ${issue.line} 行</span>
            <span class="issue-dim dim-${issue.dimension}">${dimLabel[issue.dimension] || issue.dimension}</span>
          </div>
          <div class="issue-desc">${escapeHtml(issue.description)}</div>
          <div class="issue-suggestion"><strong>建议：</strong>${escapeHtml(issue.suggestion)}</div>
          ${issue.fixed_code ? `<div class="issue-code">${escapeHtml(issue.fixed_code)}</div>` : ''}
        </div>
      `).join('');
    }

    document.getElementById('result-section').classList.add('show');
    document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
